name: Compilar mcpelauncher 32bit (Sin GUI)

on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Clonar Manifiesto 
        uses: actions/checkout@v4
        with:
          repository: 'minecraft-linux/mcpelauncher-manifest'
          ref: 'ng'
          submodules: 'recursive'
          fetch-depth: 0

      - name: Configurar arquitectura i386 e instalar dependencias
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ca-certificates build-essential git curl cmake clang ninja-build \
            gcc-multilib g++-multilib \
            zlib1g-dev:i386 libpng-dev:i386 libcurl4-openssl-dev:i386 libssl-dev:i386 \
            libasound2-dev:i386 libpulse-dev:i386 libjack-jackd2-dev:i386 \
            libx11-dev:i386 libxi-dev:i386 libxext-dev:i386 libxfixes-dev:i386 \
            libxcursor-dev:i386 libxrandr-dev:i386 libxss-dev:i386 libxtst-dev:i386 \
            libgl1-mesa-dev:i386 libegl1-mesa-dev:i386 libgles2-mesa-dev:i386 \
            libvulkan-dev:i386 libdrm-dev:i386 libgbm-dev:i386 libudev-dev:i386 \
            libevdev-dev:i386 libusb-1.0-0-dev:i386 \
            libxkbcommon-dev:i386 libcups2-dev:i386 \
            libwayland-dev:i386 libunwind-dev:i386

      - name: Compilación con Clang y Optimizaciones
        run: |
          mkdir -p build && cd build
          CC=clang CXX=clang++ cmake .. \
            -DENABLE_DEV_PATHS=OFF \
            -DBUILD_UI=OFF \
            -DBUILD_WEBVIEW=OFF \
            -DBUILD_CLIENT=ON \
            -DCURL_EXT_EXTRA_OPTIONS=-DCURL_USE_LIBPSL=OFF \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_C_FLAGS='-m32' \
            -DCMAKE_CXX_FLAGS='-m32' \
            -DCMAKE_EXE_LINKER_FLAGS='-m32' \
            -DCMAKE_FIND_ROOT_PATH='/usr/lib/i386-linux-gnu;/usr/include/i386-linux-gnu;/usr/lib;/usr/include' \
            -DCMAKE_FIND_ROOT_PATH_MODE_LIBRARY=BOTH \
            -DCMAKE_FIND_ROOT_PATH_MODE_INCLUDE=BOTH \
            -DCMAKE_FIND_ROOT_PATH_MODE_PROGRAM=NEVER \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -Wno-dev
          make -j$(nproc)

      - name: Empaquetar AppImage manualmente
        env:
          APPIMAGE_EXTRACT_AND_RUN: 1
          ARCH: i386
        run: |
          mkdir -p AppDir/usr/bin AppDir/usr/lib AppDir/usr/share/applications AppDir/usr/share/icons/hicolor/scalable/apps
          
          cp build/mcpelauncher-client/mcpelauncher-client AppDir/usr/bin/
          
          ldd AppDir/usr/bin/mcpelauncher-client | grep "=> /" | awk '{print $3}' | xargs -I '{}' cp -vn '{}' AppDir/usr/lib/ || true
          
          cat << 'EOF' > AppDir/AppRun
          #!/bin/sh
          HERE="$(dirname "$(readlink -f "${0}")")"
          export LD_LIBRARY_PATH="${HERE}/usr/lib:${LD_LIBRARY_PATH}"
          exec "${HERE}/usr/bin/mcpelauncher-client" "$@"
          EOF
          chmod +x AppDir/AppRun
          
          cat << 'EOF' > AppDir/usr/share/applications/mcpelauncher-cli.desktop
          [Desktop Entry]
          Type=Application
          Name=MCPELauncher_CLI
          Exec=mcpelauncher-client
          Icon=mcpelauncher
          Categories=Game;
          Terminal=true
          EOF
          
          cat << 'EOF' > AppDir/usr/share/icons/hicolor/scalable/apps/mcpelauncher.svg
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><rect width="64" height="64" fill="blue"/></svg>
          EOF

          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-i686.AppImage
          chmod +x appimagetool-i686.AppImage
          ./appimagetool-i686.AppImage AppDir mcpelauncher-cli-32bit.AppImage

      - name: Subir AppImage
        uses: actions/upload-artifact@v4
        with:
          name: mcpelauncher-cli-32bit-appimage
          path: MCPELauncher_CLI-*-i386.AppImage
          if-no-files-found: error

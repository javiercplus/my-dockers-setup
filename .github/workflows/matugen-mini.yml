name: MATUGEN MINI

on:
  workflow_dispatch: 

jobs:
  build-ubuntu:
    runs-on: ubuntu-latest

    steps:
    - name: Clone Codeberg repository
      run: git clone https://codeberg.org/javiercplus/mini-matugen-j.git

    - name: Install Qt6 and dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake build-essential qt6-base-dev

    - name: Configure CMake
      run: cmake -B build -S mini-matugen-j -DCMAKE_BUILD_TYPE=Release

    - name: Build Project
      run: cmake --build build --config Release

    - name: Upload executable
      uses: actions/upload-artifact@v4
      with:
        name: mini-matugen-j-linux
        path: build/mini-matugen-j

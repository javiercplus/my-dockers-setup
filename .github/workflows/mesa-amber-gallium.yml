name: Build Mesa (Amber Branch)

on:
  workflow_dispatch:

jobs:
  build-mesa-amber:
    runs-on: ubuntu-latest

    steps:
      - name: Instalar dependencias de compilación
        run: |
          sudo apt-get update
          sudo apt-get install -y meson ninja-build python3-mako flex bison pkg-config \
            libdrm-dev libx11-dev libxext-dev libxdamage-dev libxcb-glx0-dev \
            libxcb-dri2-0-dev libxcb-dri3-dev libxcb-present-dev libxshmfence-dev \
            libxxf86vm-dev libxrandr-dev libglvnd-dev libglvnd-core-dev \
            libwayland-dev wayland-protocols libunwind-dev valgrind

      - name: Clonar repositorio de Mesa (Rama Amber)
        run: git clone -b amber https://gitlab.freedesktop.org/mesa/mesa.git

      - name: Configurar el entorno con Meson
        run: |
          cd mesa
          meson setup build -Damber=true --buildtype=release

      - name: Compilar el código con Ninja
        run: |
          cd mesa
          ninja -C build

      - name: Subir binarios compilados
        uses: actions/upload-artifact@v4
        with:
          name: mesa-amber-build
          path: mesa/build/

name: Build j-micx on Debian 12.8

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

env:
  APPIMAGE_EXTRACT_AND_RUN: 1

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: debian:12.8

    steps:
    - name: Instalar Git y utilidades de red
      run: |
        apt-get update
        apt-get install -y git ca-certificates wget curl file

    - name: Clonar repositorio y preparar ImGui
      run: |
        git config --global --add safe.directory '*'
        git clone https://codeberg.org/javiercplus/j-micx.git .
        git submodule update --init --recursive
        
        if [ ! -f "imgui/imgui.h" ]; then
          rm -rf imgui
          git clone --depth 1 https://github.com/ocornut/imgui.git imgui
        fi

    - name: Instalar dependencias del sistema
      run: |
        apt-get install -y \
          build-essential \
          pkg-config \
          libsdl2-dev \
          libsdl2-image-dev \
          pulseaudio-utils \
          libgl1-mesa-dev \
          libqrencode-dev \
          openjdk-17-jdk \
          openssl \
          libfuse2 \
          imagemagick

    - name: Ejecutar script de construcción AppImage
      run: |
        chmod +x appimage/build-appimage.sh
        ./appimage/build-appimage.sh

    - name: Subir artefacto AppImage
      uses: actions/upload-artifact@v4
      with:
        name: j-micx-appimage
        path: j-micx.AppImage

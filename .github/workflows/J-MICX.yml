name: Build j-micx on Debian 12.8

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

env:
  APPIMAGE_EXTRACT_AND_RUN: 1

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: debian:12.8

    steps:
    - name: Instalar Git y certificados
      run: |
        apt-get update
        apt-get install -y git ca-certificates wget file

    - name: Clonar repositorio y preparar ImGui
      run: |
        git config --global --add safe.directory '*'
        git clone https://codeberg.org/javiercplus/j-micx.git .
        git submodule update --init --recursive
        
        if [ ! -f "imgui/imgui.h" ]; then
          rm -rf imgui
          git clone --depth 1 https://github.com/ocornut/imgui.git imgui
        fi

    - name: Instalar dependencias del sistema
      run: |
        apt-get install -y \
          build-essential \
          pkg-config \
          libsdl2-dev \
          libsdl2-image-dev \
          pulseaudio-utils \
          libgl1-mesa-dev \
          libqrencode-dev \
          openjdk-17-jdk \
          openssl \
          libfuse2

    - name: Compilar binarios y servidor Java
      run: make all

    - name: Construir AppImage personalizado
      run: |
        wget -O linuxdeploy https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
        chmod +x linuxdeploy

        cp resources/brand/icon.png j-micx.png

        cat <<EOF > j-micx.desktop
        [Desktop Entry]
        Name=j-micx
        Exec=j-micx
        Icon=j-micx
        Type=Application
        Categories=AudioVideo;
        EOF

        mkdir -p AppDir/usr/bin
        cp -r bin/* AppDir/usr/bin/
        
        ./linuxdeploy --appdir AppDir --executable AppDir/usr/bin/j-micx --desktop-file j-micx.desktop --icon-file j-micx.png --output appimage

    - name: Subir artefacto AppImage
      uses: actions/upload-artifact@v4
      with:
        name: j-micx-appimage
        path: ./*.AppImage

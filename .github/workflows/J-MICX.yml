name: Build j-micx

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del repositorio
      uses: actions/checkout@v4

    - name: Instalar dependencias del sistema
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          pkg-config \
          libsdl2-dev \
          libsdl2-image-dev \
          pulseaudio-utils \
          libgl1-mesa-dev \
          libqrencode-dev \
          openjdk-17-jdk \
          openssl \
          libfuse2

    - name: Preparar ImGui
      run: make setup

    - name: Compilar binarios y servidor Java
      run: make all

    - name: Construir paquete AppImage
      run: make appimage

    - name: Subir artefacto AppImage
      uses: actions/upload-artifact@v4
      with:
        name: j-micx-appimage
        path: ./*.AppImage

name: Build Oxicord AppImage

on:
  workflow_dispatch:

jobs:
  build:
    name: Compile and Build AppImage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout external repository
        uses: actions/checkout@v4
        with:
          repository: linuxmobile/oxicord

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libdbus-1-dev libchafa-dev libglib2.0-dev mold clang

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release

      - name: Prepare AppDir assets
        run: |
          mkdir -p AppDir/usr/bin AppDir/usr/share/applications AppDir/usr/share/icons/hicolor/scalable/apps
          cp target/release/oxicord AppDir/usr/bin/
          
          cat <<EOF > AppDir/usr/share/applications/oxicord.desktop
          [Desktop Entry]
          Name=Oxicord
          Exec=oxicord
          Icon=oxicord
          Type=Application
          Terminal=true
          Categories=Utility;TerminalEmulator;
          EOF
          
          touch AppDir/usr/share/icons/hicolor/scalable/apps/oxicord.svg

      - name: Download and extract linuxdeploy
        run: |
          wget https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage
          ./linuxdeploy-x86_64.AppImage --appimage-extract

      - name: Build AppImage
        env:
          OUTPUT: Oxicord-x86_64.AppImage
        run: |
          ./squashfs-root/AppRun --appdir AppDir --output appimage

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: oxicord-appimage
          path: Oxicord-*.AppImage
          retention-days: 7

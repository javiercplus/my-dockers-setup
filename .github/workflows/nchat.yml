name: Compilar nchat

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Clonar el repositorio
        uses: actions/checkout@v4
        with:
          repository: d99kris/nchat

      - name: Instalar dependencias
        run: ./make.sh deps

      - name: Compilar el código fuente
        run: ./make.sh build

      - name: Guardar el ejecutable compilado
        uses: actions/upload-artifact@v4
        with:
          name: nchat-ubuntu-binario
          path: build/
